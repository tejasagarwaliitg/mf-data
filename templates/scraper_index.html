<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balaji Stocks | Mutual Funds</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
:root{
  --surface:#0c1324; --surface-dim:#0c1324; --surface-bright:#33394c;
  --surface-lowest:#070d1f; --surface-low:#151b2d; --surface-mid:#191f31;
  --surface-high:#23293c; --surface-highest:#2e3447; --surface-variant:#2e3447;
  --primary:#f1bf5d; --primary-container:#c89a3c; --primary-dim:#eec05f;
  --on-primary:#412d00; --on-primary-container:#4b3400; --primary-fixed-dim:#f1bf5d;
  --secondary:#bec6e0; --secondary-container:#3f465c;
  --tertiary:#eec05f; --tertiary-container:#c59b3e;
  --on-surface:#dce1fb; --on-surface-variant:#d2c5b1;
  --outline:#9b8f7d; --outline-variant:#4f4637;
  --error:#ffb4ab; --error-container:#93000a;
  --pos:#34d399; --neg:#f87171;
  --gold:#C89A3C; --gold-light:#DBAF50; --gold-dim:#7A5D20;
  --bg-deep:#0c1324; --bg-card:rgba(15,23,42,0.6); --bg-elevated:#151b2d;
  --border-gold:rgba(200,154,60,0.1); --border-subtle:rgba(200,154,60,0.05);
  --text-primary:#dce1fb; --text-body:#dce1fb; --text-muted:#d2c5b1; --text-dim:#9b8f7d;
  --radius-sm:4px; --radius-md:6px; --radius-lg:8px; --radius-xl:12px;
  --shadow-card:0 0 15px rgba(200,154,60,0.05);
  --shadow-elevated:0 0 25px rgba(200,154,60,0.08), 0 0 0 1px rgba(200,154,60,0.06);
  --transition:150ms cubic-bezier(.4,0,.2,1);
  --font-heading:'Playfair Display',Georgia,serif;
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-data:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:#020617;color:var(--text-body);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;scrollbar-width:thin;scrollbar-color:var(--outline-variant) transparent}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--outline-variant);border-radius:2px}

.glass-card{background:rgba(15,23,42,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(200,154,60,0.1);box-shadow:0 0 15px rgba(200,154,60,0.05);border-radius:var(--radius-lg);padding:20px;margin-bottom:14px;transition:var(--transition)}
.glass-card:hover{border-color:rgba(200,154,60,0.2);box-shadow:0 0 20px rgba(200,154,60,0.08)}

/* Shimmer loading */
.shimmer{background:linear-gradient(90deg,#0f172a 25%,#1e293b 50%,#0f172a 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--radius-sm)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.spinner-sm{display:inline-block;width:14px;height:14px;border:2px solid rgba(200,154,60,0.15);border-top-color:var(--primary);border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tab-loading{display:flex;align-items:center;justify-content:center;padding:50px;gap:10px;color:var(--text-muted);font-size:13px;font-family:var(--font-body)}

/* Sidebar icon-only */
.sidebar{width:80px;min-width:80px;background:rgba(7,13,31,0.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-right:1px solid rgba(200,154,60,0.05);display:flex;flex-direction:column;align-items:center;padding:16px 0;transition:margin .25s cubic-bezier(.4,0,.2,1);overflow:hidden;z-index:40}
.sidebar.closed{margin-left:-80px}
.sidebar .logo{font-family:var(--font-heading);font-size:24px;font-weight:700;color:var(--primary);margin-bottom:24px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-lg);background:rgba(200,154,60,0.1);border:1px solid rgba(200,154,60,0.2);cursor:default}
.sidebar .logo span{display:none}
.sidebar nav{flex:1;display:flex;flex-direction:column;gap:4px;padding:0 8px;width:100%}
.sidebar nav a{display:flex;align-items:center;justify-content:center;padding:12px;border-radius:var(--radius-lg);color:var(--on-surface-variant);transition:var(--transition);position:relative}
.sidebar nav a:hover{background:rgba(200,154,60,0.08);color:var(--primary)}
.sidebar nav a.active{background:rgba(200,154,60,0.12);color:var(--primary);border-right:2px solid var(--primary)}
.sidebar nav a .material-symbols-outlined{font-size:22px}
.sidebar-footer{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:12px;padding:0 8px;width:100%}
.sidebar-footer button{width:100%;padding:10px;background:none;border:1px dashed rgba(200,154,60,0.15);border-radius:var(--radius-lg);color:var(--on-surface-variant);cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center}
.sidebar-footer button:hover{color:var(--primary);border-color:rgba(200,154,60,0.3);background:rgba(200,154,60,0.05)}
.sidebar-footer .avatar{width:36px;height:36px;border-radius:50%;border:1px solid rgba(200,154,60,0.2);background:rgba(200,154,60,0.08);display:flex;align-items:center;justify-content:center;color:var(--primary);cursor:pointer;transition:var(--transition)}
.sidebar-footer .avatar:hover{background:rgba(200,154,60,0.15)}

/* Header */
header{position:sticky;top:0;z-index:50;background:rgba(12,19,36,0.6);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(200,154,60,0.08);padding:10px 24px;box-shadow:0 0 15px rgba(200,154,60,0.03)}
.header-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;gap:16px}
.sidebar-toggle{background:none;border:none;color:var(--on-surface-variant);cursor:pointer;padding:8px;border-radius:var(--radius-md);display:flex;align-items:center;transition:var(--transition)}
.sidebar-toggle:hover{color:var(--primary);background:rgba(200,154,60,0.08)}
.logo-text{font-family:var(--font-heading);font-size:18px;font-weight:700;color:var(--primary);white-space:nowrap;letter-spacing:-.3px}
.logo-text span{color:var(--on-surface-variant);font-family:var(--font-body);font-weight:400;font-size:11px;display:none}
@media(min-width:640px){.logo-text span{display:inline;margin-left:4px}}
.search-wrap{flex:1;max-width:360px;position:relative}
.search-wrap .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--on-surface-variant);font-size:18px;pointer-events:none}
.search-wrap input{width:100%;padding:8px 12px 8px 36px;background:rgba(7,13,31,0.5);border:1px solid rgba(200,154,60,0.08);border-radius:999px;color:var(--text-body);font-family:var(--font-body);font-size:13px;outline:none;transition:var(--transition);caret-color:var(--primary)}
.search-wrap input:focus{border-color:rgba(200,154,60,0.3);box-shadow:0 0 0 3px rgba(200,154,60,0.06)}
.search-wrap input::placeholder{color:var(--text-dim)}
.search-results-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:rgba(15,23,42,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(200,154,60,0.1);border-radius:var(--radius-xl);max-height:380px;overflow-y:auto;display:none;z-index:100;box-shadow:var(--shadow-elevated)}
.search-results-dropdown.open{display:block;animation:dropIn .15s ease-out}
@keyframes dropIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.search-result-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(200,154,60,0.04);transition:background .12s}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:rgba(200,154,60,0.04)}
.search-result-item h4{font-size:13px;font-weight:600;color:var(--text-primary);font-family:var(--font-body)}
.search-result-item .sr-meta{font-size:10.5px;color:var(--text-dim);margin-top:3px;display:flex;align-items:center;gap:4px}
.search-result-item .sr-plans{margin-top:5px;display:flex;gap:4px;flex-wrap:wrap}
.search-result-item .sr-plan{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;font-size:10px;background:rgba(200,154,60,0.06);border:1px solid rgba(200,154,60,0.15);border-radius:4px;color:var(--primary-container);cursor:pointer;transition:var(--transition);font-weight:500;font-family:var(--font-data)}
.search-result-item .sr-plan:hover{background:rgba(200,154,60,0.1);border-color:rgba(200,154,60,0.3);color:var(--primary);box-shadow:0 0 8px rgba(200,154,60,.08)}

.header-actions{display:flex;align-items:center;gap:4px}
.header-actions button{display:flex;align-items:center;gap:5px;padding:8px;font-size:12px;font-weight:500;border:none;border-radius:var(--radius-md);background:transparent;color:var(--on-surface-variant);cursor:pointer;white-space:nowrap;transition:var(--transition);font-family:var(--font-body)}
.header-actions button:hover{color:var(--primary);background:rgba(200,154,60,0.08)}
.header-actions .compare-btn.active{color:var(--primary);background:rgba(200,154,60,0.1)}
.header-actions .badge{background:var(--primary);color:var(--on-primary);border-radius:8px;padding:0 6px;font-size:9px;min-width:16px;text-align:center;font-weight:700;line-height:16px;font-family:var(--font-data)}

/* Main area */
.layout{display:flex;flex:1;overflow:hidden}
.main-area{flex:1;display:flex;flex-direction:column;min-width:0}

/* Tab bar */
.tab-bar{display:flex;background:rgba(7,13,31,0.3);border-bottom:1px solid rgba(200,154,60,0.05);overflow-x:auto;padding:0 16px;gap:0;min-height:40px;align-items:stretch}
.tab-bar::-webkit-scrollbar{height:0}
.tab-item{display:flex;align-items:center;gap:5px;padding:8px 14px;font-size:12px;color:var(--on-surface-variant);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:var(--transition);user-select:none;font-family:var(--font-body);position:relative}
.tab-item:hover{color:var(--primary);background:rgba(200,154,60,0.04)}
.tab-item.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-item .close{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:3px;font-size:12px;line-height:1;color:var(--text-dim);transition:var(--transition)}
.tab-item .close:hover{background:rgba(200,154,60,0.1);color:var(--neg)}
.tab-item .tab-check{width:12px;height:12px;accent-color:var(--primary);cursor:pointer;flex-shrink:0}
.tab-item .spinner{width:10px;height:10px;border:2px solid rgba(200,154,60,0.15);border-top-color:var(--primary);border-radius:50%;animation:spin .5s linear infinite;flex-shrink:0}
.tab-item .wl-star{color:var(--text-dim);font-size:12px;padding:0 2px;transition:var(--transition)}
.tab-item .wl-star:hover{color:var(--primary)}

main{padding:24px;overflow-y:auto;max-width:1440px;margin:0 auto;width:100%}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center}
.empty-state .material-symbols-outlined{font-size:52px;color:rgba(200,154,60,0.15);margin-bottom:16px}
.empty-state h2{font-family:var(--font-heading);font-size:22px;font-weight:600;color:var(--text-dim);margin-bottom:6px}
.empty-state p{font-size:13px;color:var(--text-dim);max-width:320px;line-height:1.5;font-family:var(--font-body)}

/* Card styles */
.card{background:rgba(15,23,42,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(200,154,60,0.1);border-radius:var(--radius-lg);padding:20px;margin-bottom:14px;box-shadow:0 0 15px rgba(200,154,60,0.05);transition:var(--transition)}
.card:hover{border-color:rgba(200,154,60,0.2)}
.card h2{font-family:var(--font-heading);font-size:16px;font-weight:600;color:var(--primary);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(200,154,60,0.08);display:flex;align-items:center;gap:8px}
.card h2 .badge{font-size:10px;font-weight:500;color:var(--text-dim);background:rgba(200,154,60,0.06);padding:2px 10px;border-radius:12px;border:1px solid rgba(200,154,60,0.1);font-family:var(--font-data)}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
.meta-item{background:rgba(7,13,31,0.4);border:1px solid rgba(200,154,60,0.06);border-radius:var(--radius-md);padding:12px 10px;text-align:center;transition:var(--transition)}
.meta-item:hover{border-color:rgba(200,154,60,0.15);box-shadow:0 0 8px rgba(200,154,60,0.04)}
.meta-item .ml{font-family:var(--font-data);font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);font-weight:500}
.meta-item .mv{font-family:var(--font-data);font-size:18px;font-weight:700;margin-top:4px;letter-spacing:-.3px;color:var(--on-surface)}
.meta-item .mv.pe{color:var(--primary)}
.meta-item .mv.nav{color:var(--primary)}
.meta-item .mv.pos{color:var(--pos)}
.meta-item .mv.neg{color:var(--neg)}
.returns-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(85px,1fr));gap:6px;margin-top:10px}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--font-data)}
th,td{padding:7px 10px;text-align:left;border-bottom:1px solid rgba(200,154,60,0.04);white-space:nowrap}
th{font-family:var(--font-data);font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);font-weight:600;padding-bottom:8px}
td:first-child,th:first-child{position:sticky;left:0;background:rgba(15,23,42,0.6);z-index:1}
tr:last-child td{border-bottom:none}
.bar-bg{background:rgba(200,154,60,0.08);border-radius:3px;height:5px;width:44px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:5px}
.bar-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s ease}
.pct{font-family:var(--font-data);font-size:11px;font-weight:600}
.positive{color:var(--pos)}.negative{color:var(--neg)}.na{color:var(--text-dim);font-style:italic}.best{font-weight:700;color:var(--primary)}

.matrix-wrap{display:flex;justify-content:center;padding:8px 0}
.matrix-table{border-collapse:collapse}
.matrix-table th,.matrix-table td{text-align:center;padding:5px 8px;font-size:10px;border:1px solid rgba(200,154,60,0.04);min-width:42px}
.matrix-table th{background:rgba(200,154,60,0.04);font-weight:600;color:var(--text-dim)}
.matrix-table td.cell{font-weight:600;cursor:default;transition:var(--transition)}
.matrix-table td.cell:hover{opacity:.85}
.matrix-table .corner{background:transparent;border:none}
.oh{background:rgba(200,154,60,0.12);color:var(--primary)}
.om{background:rgba(200,154,60,0.07);color:var(--primary-dim)}  
.ol{background:rgba(200,154,60,0.03);color:var(--text-dim)}
.on{background:transparent;color:var(--outline)}
.os{background:rgba(52,211,153,0.12);color:var(--pos)}

.holdings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.card-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hcard{background:rgba(15,23,42,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(200,154,60,0.1);border-radius:var(--radius-md);overflow:hidden;transition:var(--transition)}
.hcard:hover{border-color:rgba(200,154,60,0.2)}
.hcard h3{font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--primary);padding:10px 12px;border-bottom:1px solid rgba(200,154,60,0.08);background:rgba(7,13,31,0.3)}
.hcard table{font-size:10px}
.hcard th{font-size:7.5px;padding:5px 6px}
.hcard td{padding:4px 6px}

.comp-head{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.comp-head .ch-item{background:rgba(200,154,60,0.06);border:1px solid rgba(200,154,60,0.1);border-radius:var(--radius-sm);padding:4px 10px;font-size:11px;display:flex;align-items:center;gap:5px}
.comp-head .ch-item .ch-dot{width:6px;height:6px;border-radius:50%;background:var(--primary)}
.comp-head .ch-item .ch-name{color:var(--primary)}

@media(max-width:768px){
  header{padding:8px 12px}.header-inner{gap:8px}
  .search-wrap{max-width:200px}.search-wrap input{font-size:12px;padding:6px 10px 6px 30px}
  .logo-text{font-size:16px}
  .header-actions button{padding:6px;font-size:11px}
  .sidebar{width:64px;min-width:64px}.sidebar.closed{margin-left:-64px}
  main{padding:12px}.card{padding:14px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .holdings-grid{grid-template-columns:1fr}.card-grid-2{grid-template-columns:1fr}
}

/* Navigator */
.nav-fs-overlay{display:none;position:fixed;z-index:9999;inset:0;background:rgba(2,6,23,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);justify-content:center;align-items:center;flex-direction:column;padding:24px}
.nav-fs-overlay.active{display:flex}
.nav-fs-overlay canvas{width:100%!important;height:auto!important;max-height:80vh}
.nav-fs-close{position:absolute;top:16px;right:24px;background:none;border:1px solid rgba(200,154,60,0.15);color:var(--primary);font-size:24px;cursor:pointer;padding:4px 14px;border-radius:var(--radius-sm);line-height:1;transition:var(--transition)}
.nav-fs-close:hover{background:rgba(200,154,60,0.1)}
.nav-fs-label{color:var(--primary);font-family:var(--font-heading);font-size:16px;margin-bottom:12px;font-weight:600}
.nav-navigator-wrap{position:relative;height:40px;margin-top:2px}
.nav-navigator-overlay{position:absolute;top:0;bottom:0;background:rgba(200,154,60,0.12);border:1px solid rgba(200,154,60,0.25);border-radius:2px;cursor:pointer;box-sizing:border-box;pointer-events:auto}
.nav-navigator-overlay:hover{background:rgba(200,154,60,0.2)}
.nav-navigator-wrap canvas{width:100%!important;height:100%!important}

/* Period toggle buttons */
.nav-period-btn,.nav-period-btn-cmp{background:rgba(7,13,31,0.4);border:1px solid rgba(200,154,60,0.08);color:var(--on-surface-variant);padding:2px 8px;border-radius:var(--radius-sm);font-family:var(--font-data);font-size:9px;cursor:pointer;transition:var(--transition)}
.nav-period-btn.active,.nav-period-btn-cmp.active{background:rgba(200,154,60,0.12);color:var(--primary);border-color:rgba(200,154,60,0.2)}
.nav-period-btn:hover,.nav-period-btn-cmp:hover{background:rgba(200,154,60,0.08);color:var(--primary)}

/* Fund snapshot plan badges */
.plan-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;font-family:var(--font-data);font-size:10px;background:rgba(200,154,60,0.08);border:1px solid rgba(200,154,60,0.15);border-radius:999px;color:var(--primary);font-weight:500}
.cat-badge{display:inline-flex;align-items:center;padding:2px 10px;font-family:var(--font-data);font-size:10px;background:rgba(7,13,31,0.4);border:1px solid rgba(200,154,60,0.06);border-radius:999px;color:var(--text-muted)}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle watchlist">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <div class="logo-text">Balaji <span>Stocks</span></div>
    <div class="search-wrap">
      <span class="material-symbols-outlined search-icon">search</span>
      <input type="text" id="searchInput" placeholder="Search funds..." autocomplete="off">
      <div class="search-results-dropdown" id="searchDropdown"></div>
    </div>
    <div class="header-actions">
      <button onclick="toggleCompare()" class="compare-btn" id="compareToggle" title="Compare funds">
        <span class="material-symbols-outlined">compare_arrows</span>
        <span class="badge" id="compareBadge">0</span>
      </button>
      <button onclick="exportData()" title="Export watchlist">
        <span class="material-symbols-outlined">download</span>
      </button>
      <button onclick="document.getElementById('importInput').click()" title="Import watchlist">
        <span class="material-symbols-outlined">upload</span>
      </button>
      <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
      <button onclick="scanPortfolio()" title="Scan portfolio from photo">
        <span class="material-symbols-outlined">document_scanner</span>
      </button>
      <input type="file" id="scanInput" accept="image/*" capture="environment" style="display:none" onchange="handleScanImage(event)">
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar closed" id="sidebar">
    <div class="logo">M</div>
    <nav>
      <a href="#" class="active" title="Equities" onclick="return false"><span class="material-symbols-outlined">show_chart</span></a>
      <a href="#" title="Debt" onclick="return false"><span class="material-symbols-outlined">account_balance</span></a>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
// ── Helpers ──
function _n(v, d) { return v != null && isFinite(v) ? Number(v).toFixed(d) : '-'; }

// ── State ──
let tabs = [];
let nextTabId = 1;
let activeTabId = null;
let compareMode = false;
let compareSel = new Set();
let sidebarOpen = false;
let watchlists = [];

// ── DOM refs ──
const searchInput = document.getElementById('searchInput');
const searchDropdown = document.getElementById('searchDropdown');
const tabBar = document.getElementById('tabBar');
const mainEl = document.getElementById('mainContent');
const compareToggle = document.getElementById('compareToggle');
const compareBadge = document.getElementById('compareBadge');
const sidebar = document.getElementById('sidebar');
const wlContainer = document.getElementById('watchlistContainer');
let searchTimeout = null;

// ── Init ──
function init() {
  loadState();
  renderWatchlist();
  if (tabs.length > 0) {
    renderTabBar();
    renderActiveTab();
  }
}

// ── localStorage persistence ──
function saveState() {
  try {
    var data = {
      tabs: tabs.map(function(t) { return {id: t.id, slug: t.slug, name: t.name, loading: true, data: null}; }),
      activeTabId: activeTabId,
      nextTabId: nextTabId,
      sidebarOpen: sidebarOpen,
    };
    localStorage.setItem('mfscraper_state', JSON.stringify(data));
    localStorage.setItem('mfscraper_watchlists', JSON.stringify(watchlists));
  } catch(e) {}
}

function loadState() {
  try {
    var raw = localStorage.getItem('mfscraper_state');
    if (raw) {
      var data = JSON.parse(raw);
      tabs = data.tabs || [];
      activeTabId = data.activeTabId || null;
      nextTabId = data.nextTabId || 1;
      sidebarOpen = data.sidebarOpen || false;
      // Re-fetch data for restored tabs sequentially
      tabs.forEach(function(t) { t.loading = true; t.data = null; });
      (function loadNext(i) {
        if (i >= tabs.length) return;
        fetchTabData(tabs[i]).then(function() { loadNext(i + 1); }).catch(function() { loadNext(i + 1); });
      })(0);
    }
    var wl = localStorage.getItem('mfscraper_watchlists');
    if (wl) {
      watchlists = JSON.parse(wl);
    } else {
      watchlists = [{name: 'Favourites', items: []}];
    }
    if (sidebarOpen) { sidebar.classList.remove('closed'); } else { sidebar.classList.add('closed'); }
  } catch(e) {
    tabs = [];
    watchlists = [{name: 'Favourites', items: []}];
  }
}
// -- Stale-while-revalidate cache: IndexedDB persistent + in-memory session --
var _sessionCache = {};
var _inFlightFetches = {};
var _CACHE_DB_NAME = 'FundCache_v2';
var _CACHE_STORE = 'responses';

function _openDB() {
  return new Promise(function(resolve) {
    var req = indexedDB.open(_CACHE_DB_NAME);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains(_CACHE_STORE))
        db.createObjectStore(_CACHE_STORE, { keyPath: 'url' });
    };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror = function() { resolve(null); };
  });
}

function _getCachedDB(url) {
  return _openDB().then(function(db) {
    if (!db) return null;
    return new Promise(function(resolve) {
      var tx = db.transaction(_CACHE_STORE, 'readonly');
      var req = tx.objectStore(_CACHE_STORE).get(url);
      req.onsuccess = function(e) {
        var entry = e.target.result;
        if (entry) {
          entry.data.cachedAt = entry.cachedAt;
          resolve(entry.data);
        } else {
          resolve(null);
        }
      };
      req.onerror = function() { resolve(null); };
    });
  }).catch(function() { return null; });
}

function _setCachedDB(url, data) {
  return _openDB().then(function(db) {
    if (!db) return;
    var tx = db.transaction(_CACHE_STORE, 'readwrite');
    tx.objectStore(_CACHE_STORE).put({ url: url, data: data, cachedAt: Date.now() });
  }).catch(function() {});
}

function _shouldRefresh(cachedAt) {
  if (!cachedAt) return true;
  var today = new Date();
  var cacheDate = new Date(cachedAt);
  return cacheDate.toDateString() !== today.toDateString();
}

function _cachedFetch(url) {
  if (_sessionCache[url]) return Promise.resolve(_sessionCache[url]);
  if (_inFlightFetches[url]) return _inFlightFetches[url];

  function _fetchFresh() {
    return fetch(url).then(function(r) {
      if (!r.ok) throw new Error(r.statusText);
      return r.json().then(function(fresh) {
        fresh.cachedAt = Date.now();
        _sessionCache[url] = fresh;
        _setCachedDB(url, fresh);
        return fresh;
      });
    });
  }

  var promise = _getCachedDB(url).then(function(cached) {
    if (cached && _sessionCache[url]) {
      if (sc.error) return _fetchFresh();
      if (url.indexOf('/api/fund/') !== -1 && !sc.nav_chart && !sc.rolling_1y) return _fetchFresh();
      return sc;
    }
    if (cached && !_shouldRefresh(cached.cachedAt)) {
      if (cached.error) return _fetchFresh();
      if (url.indexOf('/api/fund/') !== -1 && (!cached.nav_chart && !cached.rolling_1y)) return _fetchFresh();
      _sessionCache[url] = cached;
      return cached;
    }
    return _fetchFresh();
  });

  _inFlightFetches[url] = promise;
  promise.then(function() { delete _inFlightFetches[url]; }, function() { delete _inFlightFetches[url]; });
  return promise;
}


async function fetchTabData(tab) {
  try {
    var d = await _cachedFetch('/api/fund/' + tab.slug);
    var found = tabs.find(function(t) { return t.id === tab.id; });
    if (!found) return;
    if (d.error) { found.error = d.error; found.loading = false; }
    else { found.data = d; found.loading = false; }
    if (activeTabId === tab.id) renderActiveTab();
    renderTabBar();
  } catch(e) {
    var found = tabs.find(function(t) { return t.id === tab.id; });
    if (found) { found.error = e.message; found.loading = false; }
    if (activeTabId === tab.id) renderActiveTab();
    renderTabBar();
  }
}

// ── Search ──
searchInput.addEventListener('input', function() {
  clearTimeout(searchTimeout);
  var q = this.value.trim();
  if (!q) { closeSearch(); return; }
    searchTimeout = setTimeout(function() { doSearch(q); }, 400);
});
searchInput.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeSearch(); this.blur(); } });
document.addEventListener('click', function(e) {
  if (!searchInput.contains(e.target) && !searchDropdown.contains(e.target)) closeSearch();
});

function closeSearch() { searchDropdown.classList.remove('open'); searchDropdown.innerHTML = ''; }

async function doSearch(q) {
  searchDropdown.innerHTML = '<div style="padding:12px;text-align:center;color:var(--text-muted);font-size:12px;">Searching...</div>';
  searchDropdown.classList.add('open');
  try {
    // ponytail: skip cache for search to avoid stale IndexedDB results
    var d = await fetch('/api/search?q=' + encodeURIComponent(q) + '&_t=' + Date.now()).then(function(r) { if (!r.ok) throw new Error(r.statusText); return r.json(); });
    if (d.error) throw new Error(d.error);
    renderSearchResults(d.results);
  } catch(e) {
    searchDropdown.innerHTML = '<div style="padding:12px;text-align:center;color:var(--neg);font-size:12px;">' + e.message + '</div>';
  }
}

function renderSearchResults(results) {
  if (!results || !results.length) {
    searchDropdown.innerHTML = '<div style="padding:12px;text-align:center;color:var(--text-dim);font-size:12px;">No results found</div>';
    return;
  }
  var html = '';
  results.forEach(function(r) {
    var firstSlug = r.plans && r.plans[0] ? r.plans[0].slug : r.base;
    var inWl = isInWatchlist(r.name);
    var plansHtml = '';
    if (r.plans && r.plans.length > 0) {
      r.plans.forEach(function(p) {
        plansHtml += '<span class="sr-plan" data-slug="' + p.slug + '" data-plan="' + p.plan + '">' + escHtml(p.plan) + '</span>';
      });
    }
    html += '<div class="search-result-item" data-slug="' + firstSlug + '" data-name="' + escHtml(r.name) + '">' +
      '<h4>' + escHtml(r.name) + ' <span style="float:right;cursor:pointer;display:inline-flex;align-items:center;" class="wl-star-btn"><span class="material-symbols-outlined" style="font-size:16px;color:' + (inWl ? 'var(--primary)' : 'var(--text-dim)') + ';">' + (inWl ? 'star' : 'star_border') + '</span></span></h4>' +
      '<div class="sr-meta" style="margin-bottom:4px;"><span class="material-symbols-outlined" style="font-size:11px;margin-right:2px;opacity:.6;">layers</span>' + (r.plans ? r.plans.length : 0) + ' plan(s)</div>' +
      '<div class="sr-plans">' + plansHtml + '</div>' +
      '</div>';
  });
  searchDropdown.innerHTML = html;
  searchDropdown.querySelectorAll('.search-result-item').forEach(function(el) {
    el.addEventListener('click', function(e) {
      if (e.target.classList.contains('wl-star-btn') || e.target.closest('.wl-star-btn')) return;
      if (e.target.classList.contains('sr-plan')) return;
      var slug = el.dataset.slug;
      var name = el.dataset.name;
      closeSearch();
      searchInput.value = '';
      openTab(slug, name);
    });
  });
  searchDropdown.querySelectorAll('.sr-plan').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      var slug = el.dataset.slug;
      var name = el.closest('.search-result-item').dataset.name;
      var plan = el.dataset.plan;
      closeSearch();
      searchInput.value = '';
      openTab(slug, name + ' (' + plan + ')');
    });
  });
  searchDropdown.querySelectorAll('.wl-star-btn').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      var item = e.target.closest('.search-result-item');
      var name = item.dataset.name;
      var slug = item.dataset.slug;
      toggleWatchlistItem(name, slug);
      var icon = el.querySelector('.material-symbols-outlined');
      var inWl = isInWatchlist(name);
      icon.textContent = inWl ? 'star' : 'star_border';
      icon.style.color = inWl ? 'var(--primary)' : 'var(--text-dim)';
    });
  });
}

function isInWatchlist(name) {
  return watchlists.some(function(wl) { return wl.items.some(function(it) { return it.name === name; }); });
}

// ── Tabs ──
function openTab(slug, name) {
  var existing = tabs.find(function(t) { return t.slug === slug; });
  if (existing) { switchTab(existing.id); return; }
  var id = nextTabId++;
  var tab = {id: id, slug: slug, name: name, loading: true, data: null};
  tabs.push(tab);
  saveState();
  renderTabBar();
  switchTab(id);
  showLoading();
  fetchTabData(tab);
}

function closeTab(id) {
  var idx = tabs.findIndex(function(t) { return t.id === id; });
  if (idx === -1) return;
  tabs.splice(idx, 1);
  compareSel.delete(id);
  updateCompareBadge();
  if (activeTabId === id) { activeTabId = tabs.length > 0 ? tabs[Math.min(idx, tabs.length - 1)].id : null; }
  saveState();
  renderTabBar();
  renderActiveTab();
}

function switchTab(id) { activeTabId = id; saveState(); renderTabBar(); renderActiveTab(); }

function renderTabBar() {
  if (!tabs.length) { tabBar.innerHTML = '<div style="height:0"></div>'; return; }
  var html = '';
  tabs.forEach(function(t) {
    var active = t.id === activeTabId ? ' active' : '';
    var checkHtml = compareMode ? '<input type="checkbox" class="tab-check" data-tab-id="' + t.id + '" ' + (compareSel.has(t.id) ? 'checked' : '') + '>' : '';
    var indicator = t.loading ? '<span class="spinner"></span>' : '';
    var inWl = isInWatchlist(t.name);
    var starHtml = '<span class="wl-star material-symbols-outlined" onclick="event.stopPropagation();toggleWatchlistItem(\'' + escJs(t.name) + '\',\'' + escJs(t.slug) + '\')" title="' + (inWl ? 'Remove from watchlist' : 'Add to watchlist') + '" style="font-size:13px;color:' + (inWl ? 'var(--primary)' : 'var(--text-dim)') + ';cursor:pointer;">' + (inWl ? 'star' : 'star_border') + '</span>';
    html += '<div class="tab-item' + active + '" data-tab-id="' + t.id + '" onclick="switchTab(' + t.id + ')">' +
      checkHtml + indicator + starHtml +
      '<span>' + escHtml(t.name.length > 22 ? t.name.slice(0, 22) + '..' : t.name) + '</span>' +
      '<span class="close material-symbols-outlined" onclick="event.stopPropagation();closeTab(' + t.id + ')" style="font-size:14px;">close</span>' +
      '</div>';
  });
  tabBar.innerHTML = html;
  if (compareMode) {
    tabBar.querySelectorAll('.tab-check').forEach(function(cb) {
      cb.addEventListener('change', function() {
        var tid = parseInt(cb.dataset.tabId);
        if (cb.checked) compareSel.add(tid); else compareSel.delete(tid);
        updateCompareBadge();
        if (compareSel.size >= 2) showCompareView();
      });
    });
  }
}

// ── Sidebar / Watchlist ──
function toggleSidebar() { sidebarOpen = !sidebarOpen; sidebar.classList.toggle('closed', !sidebarOpen); saveState(); }

function toggleWatchlistItem(name, slug) {
  // Find which watchlist to add to (first one by default, or Favourites)
  if (watchlists.length === 0) watchlists.push({name: 'Favourites', items: []});
  var wl = watchlists[0];
  var idx = wl.items.findIndex(function(it) { return it.name === name; });
  if (idx >= 0) { wl.items.splice(idx, 1); }
  else { wl.items.push({name: name, slug: slug}); }
  saveState();
  renderWatchlist();
  renderTabBar(); // refresh star icons
}

function renderWatchlist(filter) {
  var html = '';
  watchlists.forEach(function(wl) {
    var items = filter ? wl.items.filter(function(it) { return it.name.toLowerCase().includes(filter.toLowerCase()); }) : wl.items;
    html += '<div class="wl-group"><div class="wl-group-header"><span>' + escHtml(wl.name) + '</span><span class="count">' + items.length + '</span></div>';
    items.forEach(function(it) {
      var amtStr = it.amount ? ' <span style="color:var(--pos);font-size:10px;">' + escHtml(it.amount) + '</span>' : '';
      html += '<div class="wl-item" onclick="openTab(\'' + escJs(it.slug) + '\',\'' + escJs(it.name) + '\')">' +
        '<span class="material-symbols-outlined wl-item-icon">show_chart</span>' +
        '<span>' + escHtml(it.name) + amtStr + '</span>' +
        '<span class="wl-remove material-symbols-outlined" onclick="event.stopPropagation();removeFromWatchlist(\'' + escJs(it.name) + '\')" style="font-size:14px;">close</span>' +
        '</div>';
    });
    html += '</div>';
  });
  wlContainer.innerHTML = html || '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:12px;">No watchlists</div>';
}

function filterWatchlist(q) { renderWatchlist(q); }

function removeFromWatchlist(name) {
  watchlists.forEach(function(wl) {
    wl.items = wl.items.filter(function(it) { return it.name !== name; });
  });
  saveState();
  renderWatchlist();
  renderTabBar();
}

function addWatchlist() {
  var name = prompt('Watchlist name:');
  if (name && name.trim()) { watchlists.push({name: name.trim(), items: []}); saveState(); renderWatchlist(); }
}

// ── Import / Export ──
function exportData() {
  var data = {watchlists: watchlists, exportedAt: new Date().toISOString()};
  var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'aura_watchlist.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (data.watchlists && Array.isArray(data.watchlists)) {
        // Merge: add imported watchlists that don't exist
        data.watchlists.forEach(function(impWl) {
          var existing = watchlists.find(function(w) { return w.name === impWl.name; });
          if (existing) {
            // Merge items
            impWl.items.forEach(function(it) {
              if (!existing.items.find(function(x) { return x.name === it.name; })) {
                existing.items.push(it);
              }
            });
          } else {
            watchlists.push(impWl);
          }
        });
        saveState();
        renderWatchlist();
        renderTabBar();
        alert('Imported ' + data.watchlists.length + ' watchlist(s)');
      }
    } catch(err) { alert('Invalid file'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── Scan Portfolio ──
var scannedFunds = [];
var scanPortfolioName = 'Portfolio';

function scanPortfolio() {
  document.getElementById('scanModal').style.display = 'block';
  // Reset modal to initial state
  document.getElementById('scanPreview').style.display = 'none';
  document.getElementById('scanPlaceholder').style.display = 'block';
  document.getElementById('extractBtn').style.display = 'none';
  document.getElementById('ocrSection').style.display = 'none';
  document.getElementById('scanResults').style.display = 'none';
  document.getElementById('ocrText').value = '';
  document.getElementById('matchedFunds').innerHTML = '';
  document.getElementById('addPortfolioBtn').disabled = false;
  scannedFunds = [];
  document.getElementById('scanInput').click();
}

function handleScanImage(event) {
  var file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  document.getElementById('scanModal').style.display = 'block';
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById('scanPreview');
    img.src = e.target.result;
    img.onload = function() {
      // Resize large images for faster OCR
      var maxDim = 1600;
      var canvas = document.createElement('canvas');
      var w = img.naturalWidth, h = img.naturalHeight;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = h / w * maxDim; w = maxDim; }
        else { w = w / h * maxDim; h = maxDim; }
      }
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      img.src = canvas.toDataURL('image/jpeg', 0.85);
    };
    img.style.display = 'block';
    document.getElementById('scanPlaceholder').style.display = 'none';
    document.getElementById('extractBtn').style.display = 'inline-flex';
    document.getElementById('ocrSection').style.display = 'none';
    document.getElementById('scanResults').style.display = 'none';
    scannedFunds = [];
  };
  reader.readAsDataURL(file);
}

async function runOcr() {
  var btn = document.getElementById('extractBtn');

  btn.innerHTML = '<span class="spinner-sm" style="display:inline-block;vertical-align:middle;margin-right:6px;width:14px;height:14px;border-width:2px;"></span> Extracting...';
  try {
    var img = document.getElementById('scanPreview');
    var result = await Tesseract.recognize(img.src, 'eng', {
      logger: function(m) {
        if (m.status === 'recognizing text') {
          btn.innerHTML = '<span class="spinner-sm" style="display:inline-block;vertical-align:middle;margin-right:6px;width:14px;height:14px;border-width:2px;"></span> Extracting ' + Math.round(m.progress * 100) + '%';
        }
      }
    });

    btn.style.display = 'none';

}

function parseFunds() {
  var text = document.getElementById('ocrText').value;
  var lines = text.split('\n').map(function(l) { return l.trim(); }).filter(Boolean);
  // Patterns for amounts: ₹, Rs., INR, or plain numbers with commas/dots
  var amountRe = /(?:₹|Rs\.?\s*|INR\s*)?(?:\d{1,3}(?:,\d{2,3})*(?:\.\d{1,2})?)(?:\s*(?:Cr|Lakh|Thousand)?)/i;
  var funds = [];
  lines.forEach(function(line) {
    // Try extracting amount at end of line
    var amtMatch = line.match(amountRe);
    var name = line;
    var amount = '';
    if (amtMatch) {
      amount = amtMatch[0].trim();
      name = line.slice(0, amtMatch.index).trim();
    }
    // Clean up name
    name = name.replace(/[–—\-|:;•·,.\s]+$/, '').trim();
    name = name.replace(/^[–—\-|:;•·,.\s]+/, '').trim();
    // Remove common plan suffixes from OCR'd name
    name = name.replace(/[-–—]\s*(Direct Plan|Regular Plan|Direct|Regular|Growth)\s*$/i, '').trim();
    name = name.replace(/\s*(Direct Plan|Regular Plan|Direct|Regular|Growth)\s*$/i, '').trim();
    if (name && name.length > 5) {
      funds.push({name: name, amount: amount});
    }
  });
  // Deduplicate
  var seen = {};
  funds = funds.filter(function(f) {
    var key = f.name.toLowerCase().replace(/\s+/g, ' ');
    if (seen[key]) return false;
    seen[key] = true;
    return true;
  });
  if (funds.length === 0) {
    document.getElementById('matchedFunds').innerHTML = '<p style="color:var(--text-dim);font-size:12px;">No fund names detected. Edit the text and try again.</p>';
    document.getElementById('scanResults').style.display = 'block';
    return;
  }
  // Show parsing status
  var html = '';
  funds.forEach(function(f, i) {
    html += '<div style="background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:10px;margin-bottom:6px;">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;">' +
      '<span style="font-size:12px;color:var(--text-muted);">' + escHtml(f.name) + '</span>' +
      (f.amount ? '<span style="font-size:12px;color:var(--pos);font-weight:600;">' + escHtml(f.amount) + '</span>' : '') +
      '</div>' +
      '<div style="font-size:11px;color:var(--text-dim);margin-top:4px;"><span class="spinner-sm" style="width:10px;height:10px;border-width:1.5px;display:inline-block;vertical-align:middle;"></span> Searching...</div>' +
      '</div>';
  });
  document.getElementById('matchedFunds').innerHTML = html;
  document.getElementById('scanResults').style.display = 'block';
  document.getElementById('addPortfolioBtn').disabled = true;

  // Search each fund
  scannedFunds = [];
  var pending = funds.length;
  funds.forEach(function(f, i) {
    (function(fund) {
      fetch('/api/search?q=' + encodeURIComponent(fund.name) + '&_t=' + Date.now()).then(function(r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function(d) {
          if (d.results && d.results.length > 0) {
            var best = d.results[0];
            var slug = best.plans && best.plans[0] ? best.plans[0].slug : best.base;
            var planType = best.plans && best.plans[0] ? best.plans[0].plan : '';
            scannedFunds.push({name: best.name, slug: slug, plan: planType, amount: fund.amount, raw: fund.name});
          }
        })
        .catch(function() {})
        .finally(function() {
          pending--;
          if (pending <= 0) renderScanMatches();
        });
    })(f);
  });
}

function renderScanMatches() {
  var html = '';
  var matched = 0;
  scannedFunds.forEach(function(f) {
    html += '<div style="background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;">' +

}

function _clientOverlap(fundsData) {
  var slugs = Object.keys(fundsData);
  var hm = {};
  slugs.forEach(function(s) {
    var h = {};
    (fundsData[s].holdings||[]).forEach(function(x) {
      if (x.company && x.percent!=null) h[x.company] = x.percent;
    });
    hm[s] = h;
  });
  var m = {};
  slugs.forEach(function(s1) {
    m[s1] = {};
    slugs.forEach(function(s2) {
      if (s1===s2) { m[s1][s2]=100.0; return; }
      var h1=hm[s1]||{}, h2=hm[s2]||{};
      var common=Object.keys(h1).filter(function(k){return k in h2;});
      if (!common.length) { m[s1][s2]=0.0; return; }
      m[s1][s2]=Math.round(common.reduce(function(s,k){return s+Math.min(h1[k],h2[k]);},0)*100)/100;
    });
  });
  return m;
}

function _clientJaccard(fundsData) {
  var slugs = Object.keys(fundsData);
  var hm = {};
  slugs.forEach(function(s) {
    var names = {};
    (fundsData[s].holdings||[]).forEach(function(x) {
      if (x.company) names[x.company] = 1;
    });
    hm[s] = names;
  });
  var m = {};
  slugs.forEach(function(s1) {
    m[s1] = {};
    slugs.forEach(function(s2) {
      if (s1===s2) { m[s1][s2]=100.0; return; }
      var h1=Object.keys(hm[s1]||{}), h2=Object.keys(hm[s2]||{});
      if (!h1.length||!h2.length) { m[s1][s2]=0.0; return; }
      var common=0;
      for (var i=0;i<h1.length;i++) if (h2.indexOf(h1[i])!==-1) common++;
      var union=h1.length+h2.length-common;
      if (union===0) { m[s1][s2]=0.0; return; }
      m[s1][s2]=Math.round(common/union*10000)/100;
    });
  });
  return m;
}

function _clientCorrelation(fundsData, years) {
  var slugs = Object.keys(fundsData);
  var rm = {};
  var cutoff = null;
  if (years>0) {
    var latest = null;
    slugs.forEach(function(s) {
      var nav = fundsData[s].nav_chart;
      if (nav&&nav.length>=2) {
        var d = nav[nav.length-1][0];
        if (!latest||d>latest) latest=d;
      }
    });
    if (latest) cutoff = new Date(latest);
    if (cutoff) cutoff.setDate(cutoff.getDate()-Math.round(years*365));
  }
  slugs.forEach(function(s) {
    var nav = fundsData[s].nav_chart;
    if (!nav||nav.length<2) return;
    var sliced = nav;
    if (cutoff) sliced = nav.filter(function(p){return new Date(p[0])>=cutoff;});
    if (sliced.length<2) return;
    var rets = [];
    for (var i=1;i<sliced.length;i++) {
      var p = sliced[i-1][1], c = sliced[i][1];
      if (p&&c&&p>0) rets.push((c-p)/p);
    }
    if (rets.length>=2) rm[s]=rets;
  });
  var m = {};
  slugs.forEach(function(s1) {
    m[s1] = {};
    slugs.forEach(function(s2) {
      if (s1===s2) { m[s1][s2]=100.0; return; }
      var r1 = rm[s1], r2 = rm[s2];
      if (!r1||!r2||r1.length<2||r2.length<2) { m[s1][s2]=0.0; return; }
      var n = Math.min(r1.length, r2.length);
      r1 = r1.slice(-n); r2 = r2.slice(-n);
      var m1 = r1.reduce(function(a,b){return a+b;},0)/n;
      var m2 = r2.reduce(function(a,b){return a+b;},0)/n;
      var num = 0, d1 = 0, d2 = 0;
      for (var i=0;i<n;i++) {
        var da = r1[i]-m1, db = r2[i]-m2;
        num += da*db;
        d1 += da*da;
        d2 += db*db;
      }
      var den = Math.sqrt(d1)*Math.sqrt(d2);
      m[s1][s2] = den===0 ? 0.0 : Math.round(num/den*10000)/100;
    });
  });
  return m;
}

function _rebasedNavSlice(navData, periodDays) {
  if (!navData || navData.length < 2) return null;
  var sliced;
  if (!periodDays) {
    sliced = navData;
  } else {
    var endDate = new Date(navData[navData.length-1][0]);
    var cutoff = new Date(endDate.getTime() - periodDays * 86400000);
    sliced = [];
    for (var i = 0; i < navData.length; i++) {
      if (new Date(navData[i][0]) >= cutoff) sliced.push(navData[i]);
    }
    if (sliced.length < 2) sliced = navData;
  }
  var base = sliced[0][1];
  return sliced.map(function(p){return [p[0], (p[1] / base - 1) * 100, p[1]];});
}

function _alignByDate(rebased, dateLabels) {
  var pctMap = {}, rawMap = {};
  for (var i = 0; i < rebased.length; i++) {
    pctMap[rebased[i][0]] = rebased[i][1];
    rawMap[rebased[i][0]] = rebased[i][2];
  }
  var pcts = [], raws = [];
  for (var i = 0; i < dateLabels.length; i++) {
    var d = dateLabels[i];
    pcts.push(pctMap[d] !== undefined ? pctMap[d] : null);
    raws.push(rawMap[d] !== undefined ? rawMap[d] : null);
  }
  return { pcts: pcts, raws: raws };
}

function _buildNavChart(canvas, datasets, labels) {
  if (!canvas || typeof Chart === 'undefined') return;
  if (canvas._navChart) canvas._navChart.destroy();
  canvas._navChart = new Chart(canvas, {
    type: 'line',
    data: { labels: labels || [], datasets: datasets },
    options: {
      responsive: true, maintainAspectRatio: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top', labels: { color: '#e2e8f0', font: {size:9}, boxWidth: 12, padding: 8, usePointStyle: true, pointStyle: 'circle' }
        },
        tooltip: {
          enabled: false,
          mode: 'index',
          intersect: false,
          external: function(context){
            var tooltipModel = context.tooltip;
            var chart = context.chart;
            var container = chart.canvas.parentElement;
            var el = container.querySelector('.nav-tt');
            if (!el){
              el = document.createElement('div');
              el.className = 'nav-tt';
              el.style.cssText = 'position:absolute;background:rgba(17,24,39,0.93);border:1px solid #2A1E0E;border-radius:6px;padding:6px 10px;font-size:11px;pointer-events:none;z-index:100;color:#e2e8f0;display:none;min-width:100px;';
              container.appendChild(el);
            }
            if (tooltipModel.opacity === 0){ el.style.display = 'none'; return; }
            var items = tooltipModel.dataPoints || [];
            var filtered = [];
            for (var ii = 0; ii < items.length; ii++){
              var it = items[ii];
              if (it.parsed && it.parsed.y !== undefined && it.parsed.y !== null) filtered.push(it);
            }
            filtered.sort(function(a,b){return b.parsed.y - a.parsed.y;});
            var html = '<div style="font-weight:600;margin-bottom:3px;color:#DBAF50;font-size:10px;border-bottom:1px solid #2A1E0E;padding-bottom:3px;">' + (tooltipModel.title && tooltipModel.title[0] ? tooltipModel.title[0] : '') + '</div>';
            for (var ii = 0; ii < filtered.length; ii++){
              var it = filtered[ii];
              var label = it.dataset.label || '';
              var pct = it.parsed.y.toFixed(2) + '%';
              var raw = it.dataset._rawNav ? it.dataset._rawNav[it.dataIndex] : null;
              var color = it.dataset.borderColor || '#C89A3C';
              html += '<div style="display:flex;align-items:center;gap:4px;padding:1px 0;"><span style="color:' + color + ';font-size:14px;line-height:1;">●</span><span style="flex:1;">' + label + '</span>';
              if (raw !== null) html += '<span style="color:#64748b;margin:0 3px;">₹' + raw.toFixed(2) + '</span>';
              html += '<span style="color:' + (it.parsed.y >= 0 ? '#34d399' : '#f87171') + ';font-weight:600;">' + pct + '</span></div>';
            }
            el.innerHTML = html;
            var pos = tooltipModel;
            el.style.display = 'block';
            var rect = container.getBoundingClientRect();
            var left = pos.caretX + 8;
            var top = pos.caretY - 8;
            if (left + el.offsetWidth > rect.width) left = pos.caretX - el.offsetWidth - 8;
            if (top + el.offsetHeight > rect.height) top = rect.height - el.offsetHeight - 4;
            if (top < 0) top = 4;
            el.style.left = left + 'px';
            el.style.top = top + 'px';
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: '#475569', font: {size:8}, maxTicksLimit: 10, autoSkip: true,
            callback: function(v,i,arr){if(arr.length>10&&i!==0&&i!==arr.length-1&&i!==Math.floor(arr.length/2)&&i!==Math.floor(arr.length/3)&&i!==Math.floor(arr.length*2/3))return'';return this.getLabelForValue(v).slice(0,7);}
          }
        },
        y: {
          grid: { color: '#1C1508' },
          ticks: { color: '#64748b', font: {size:9}, maxTicksLimit: 6, callback: function(v){return (v>0?'+':'')+v.toFixed(1)+'%';} }
        }
      }
    }
  });
}

function _buildNavigator(slug, navData, visibleStartDate, visibleEndDate) {
  var navCanvas = document.getElementById('nav-navigator-' + slug);
  if (!navCanvas) return;
  if (navCanvas._navChart) { navCanvas._navChart.destroy(); navCanvas._navChart = null; }
  if (!navData || navData.length < 3) return;
  var step = Math.max(1, Math.floor(navData.length / 200));
  var sampled = [];
  for (var i = 0; i < navData.length; i += step) sampled.push(navData[i]);
  if (sampled[sampled.length-1] !== navData[navData.length-1]) sampled.push(navData[navData.length-1]);
  var labels = sampled.map(function(p){return p[0];});
  var values = sampled.map(function(p){return p[1];});
  var firstVal = values[0] || 1;
  var pctValues = values.map(function(v){return (v / firstVal - 1) * 100;});
  navCanvas._navChart = new Chart(navCanvas, {
    type: 'line',
    data: { labels: labels, datasets: [{
      data: pctValues, borderColor: '#7A5D20', borderWidth: 1, pointRadius: 0, fill: false,
    }]},
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: { display: false, grid: { display: false } },
        y: { display: false, grid: { display: false } }
      },
      elements: { point: { radius: 0 } }
    }
  });
  _updateNavigatorOverlay(slug, navData, visibleStartDate, visibleEndDate);
}

function _updateNavigatorOverlay(slug, navData, visibleStartDate, visibleEndDate) {
  var overlay = document.getElementById('nav-navigator-overlay-' + slug);
  if (!overlay || !navData || navData.length < 2) return;
  var fullStart = new Date(navData[0][0]).getTime();
  var fullEnd = new Date(navData[navData.length-1][0]).getTime();
  var visStart = new Date(visibleStartDate).getTime();
  var visEnd = new Date(visibleEndDate).getTime();
  var totalRange = fullEnd - fullStart;
  if (totalRange <= 0) return;
  var left = Math.max(0, ((visStart - fullStart) / totalRange) * 100);
  var right = Math.min(100, ((visEnd - fullStart) / totalRange) * 100);
  overlay.style.left = left + '%';
  overlay.style.width = Math.max(2, right - left) + '%';
}

function _initNavigatorDrag(slug, navData, buildChartCallback) {
  var overlay = document.getElementById('nav-navigator-overlay-' + slug);
  var wrapper = document.getElementById('nav-navigator-wrapper-' + slug);
  if (!overlay || !wrapper) return;
  var dragging = false, startX = 0, startLeft = 0;
  overlay.addEventListener('mousedown', function(e) {
    dragging = true; startX = e.clientX; startLeft = parseFloat(overlay.style.left) || 0;
    e.preventDefault();
  });
  wrapper.addEventListener('click', function(e) {
    if (dragging) return;
    var rect = wrapper.getBoundingClientRect();
    var clickPct = (e.clientX - rect.left) / rect.width;
    var fullStart = new Date(navData[0][0]).getTime();
    var fullEnd = new Date(navData[navData.length-1][0]).getTime();
    var periodBtns = document.getElementById('nav-period-toggle-' + slug);
    if (!periodBtns) return;
    var activeBtn = periodBtns.querySelector('.nav-period-btn.active');
    if (!activeBtn) return;
    var period = activeBtn.getAttribute('data-period');
    var _PERIODS = {'1M':30,'3M':90,'6M':180,'1Y':365,'2Y':730,'3Y':1095,'5Y':1825,'10Y':3650};
    var dayOffset = period === 'ALL' ? (fullEnd - fullStart) / 86400000 : _PERIODS[period];
    if (!dayOffset) return;
    var halfRangeMs = (dayOffset * 86400000) / 2;
    var clickMs = fullStart + (fullEnd - fullStart) * clickPct;
    var newStart = new Date(clickMs - halfRangeMs);
    var newEnd = new Date(clickMs + halfRangeMs);
    if (newStart < new Date(navData[0][0])) { newStart = new Date(navData[0][0]); newEnd = new Date(newStart.getTime() + dayOffset * 86400000); }
    if (newEnd > new Date(navData[navData.length-1][0])) { newEnd = new Date(navData[navData.length-1][0]); newStart = new Date(newEnd.getTime() - dayOffset * 86400000); }
    _updateNavigatorOverlay(slug, navData, newStart.toISOString().slice(0,10), newEnd.toISOString().slice(0,10));
    if (typeof buildChartCallback === 'function') buildChartCallback(newStart.toISOString().slice(0,10), newEnd.toISOString().slice(0,10));
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var rect = wrapper.getBoundingClientRect();
    var dxPct = ((e.clientX - startX) / rect.width) * 100;
    var newLeft = startLeft + dxPct;
    var overlayW = parseFloat(overlay.style.width) || 20;
    newLeft = Math.max(0, Math.min(100 - overlayW, newLeft));
    overlay.style.left = newLeft + '%';
  });
  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false;
    var overlayW = parseFloat(overlay.style.width) || 20;
    var leftPct = parseFloat(overlay.style.left) || 0;
    var fullStart = new Date(navData[0][0]).getTime();
    var fullEnd = new Date(navData[navData.length-1][0]).getTime();
    if (fullEnd - fullStart <= 0) return;
    var visStart = new Date(fullStart + (fullEnd - fullStart) * (leftPct / 100));
    var visEnd = new Date(fullStart + (fullEnd - fullStart) * ((leftPct + overlayW) / 100));
    if (typeof buildChartCallback === 'function') buildChartCallback(visStart.toISOString().slice(0,10), visEnd.toISOString().slice(0,10));
  });
}

function renderFundCharts(f) {
  if (!f || typeof Chart === 'undefined') return;
  var slugSafe = f.slug;
  var navData = f.nav_chart;
  var bmChart = f.benchmark_chart;
  var bmName = f.benchmark_name;
  if (bmChart && bmChart.length >= 2 && bmName) {
    console.log('Benchmark chart ready:', bmName, bmChart.length, 'pts', bmChart[0][0], 'to', bmChart[bmChart.length-1][0]);
  }
  if ((!navData || navData.length < 2) && (!bmChart || bmChart.length < 2)) return;
  _fundNavCache[slugSafe] = { navData: navData || [], name: f.name, bmChart: bmChart, bmName: bmName };

  var canvas = document.getElementById('nav-chart-' + slugSafe);
  if (!canvas) return;

  var fundColor = '#C89A3C';
  var navigatorData = navData || bmChart;
  function _rebased(data, days, customStart, customEnd) {
    if (!data || data.length < 2) return null;
    var sliced;
    if (customStart && customEnd) {
      sliced = [];
      for (var i = 0; i < data.length; i++) {
        if (data[i][0] >= customStart && data[i][0] <= customEnd) sliced.push(data[i]);
      }
      if (sliced.length < 2) sliced = data;
    } else {
      if (!days) { sliced = data; }
      else {
        var endDate = new Date(data[data.length-1][0]);
        var cutoff = new Date(endDate.getTime() - days * 86400000);
        sliced = [];
        for (var i = 0; i < data.length; i++) {
          if (new Date(data[i][0]) >= cutoff) sliced.push(data[i]);
        }
        if (sliced.length < 2) sliced = data;
      }
    }
    var base = sliced[0][1];
    return sliced.map(function(p){return [p[0], (p[1] / base - 1) * 100, p[1]];});
  }

  function buildChart(periodKey, customStart, customEnd) {
    var _PERIODS = {'1M':30,'3M':90,'6M':180,'1Y':365,'2Y':730,'3Y':1095,'5Y':1825,'10Y':3650};
    var days = _PERIODS[periodKey];
    if (periodKey === 'ALL') days = null;
    var chartConfigs = [];
    if (navData && navData.length >= 2) {
      var r = _rebased(navData, days, customStart, customEnd);
      if (r) chartConfigs.push({rebased:r, label:f.name?f.name.slice(0,20):'Fund', color:fundColor, bg:'rgba(200,154,60,0.06)', w:1.5, fill:true});
    }
    if (bmChart && bmChart.length >= 2) {
      var r = _rebased(bmChart, days, customStart, customEnd);
      if (r) chartConfigs.push({rebased:r, label:bmName||'Benchmark', color:'#5499ff', bg:'rgba(84,153,255,0.04)', w:2.5, fill:false, dash:[6,4]});
    }
    if (!chartConfigs.length) return;
    var dateSet = {};
    chartConfigs.forEach(function(c){c.rebased.forEach(function(p){dateSet[p[0]]=true;});});
    var labels = Object.keys(dateSet).sort();
    var datasets = chartConfigs.map(function(c){
      var a = _alignByDate(c.rebased, labels);
      var ds = {label:c.label, data:a.pcts, _rawNav:a.raws, borderColor:c.color, backgroundColor:c.bg, borderWidth:c.w, pointRadius:0, pointHoverRadius:4, tension:0.1, fill:c.fill, spanGaps:true};
      if (c.dash) ds.borderDash = c.dash;
      return ds;
    });
    _buildNavChart(canvas, datasets, labels);
    _buildNavigator(slugSafe, navigatorData, labels[0], labels[labels.length-1]);
  }

  try { buildChart('3Y'); } catch(e) { console.error('Chart build error:', e); }
  var toggleEl = document.getElementById('nav-period-toggle-' + slugSafe);
  if (toggleEl) {
    var btns = toggleEl.querySelectorAll('.nav-period-btn');
    btns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        btns.forEach(function(b){b.classList.remove('active');b.style.background='var(--bg-elevated)';b.style.color='var(--text-muted)';b.style.borderColor='var(--border-subtle)';});
        this.classList.add('active'); this.style.background='var(--border-subtle)'; this.style.color='var(--primary-light)'; this.style.borderColor='var(--primary-dim)';
        try { buildChart(this.getAttribute('data-period')); } catch(e) { console.error('Chart period error:', e); }
      });
    });
    if (btns.length) btns[2].click();
  }
  _initNavigatorDrag(slugSafe, navigatorData, function(cs, ce) {
    var periodBtns = document.getElementById('nav-period-toggle-' + slugSafe);
    if (periodBtns) {
      var activeBtn = periodBtns.querySelector('.nav-period-btn.active');
      var p = activeBtn ? activeBtn.getAttribute('data-period') : '3Y';
      try { buildChart(p, cs, ce); } catch(e) { console.error('Chart drag error:', e); }
    }
  });

}

  var hHtml = '';

  } else { hHtml = '<p class="na" style="text-align:center;padding:16px;">No holdings data</p>'; }

      managerHtml += '<div style="background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:10px;">' +

        '</div>' +
        (expShort ? '<p style="font-size:10px;color:var(--text-muted);margin:0;line-height:1.4;">' + escHtml(expShort) + '</p>' : '') +
        '</div>';
    });
    managerHtml += '</div></div>';
  }

  return '<div class="card">' +
    '<h2 style="font-size:18px;border:none;padding-bottom:0;margin-bottom:4px;color:var(--primary-light);">' + escHtml(f.name) + ' ' + planBadge + '</h2>' +
    '<p style="color:var(--text-muted);font-size:12px;margin-bottom:16px;display:flex;align-items:center;gap:4px;"><span class="material-symbols-outlined" style="font-size:10px;opacity:.5;">circle</span> ' + escHtml(cat) + '</p>' +
    '<div class="meta-grid">' + metaHtml + '</div></div>' +
    managerHtml +
    (hasPerf || hasBmPerf ? '<div class="card"><h2 style="display:flex;align-items:center;gap:8px;">Performance<button onclick="_toggleNavFS(\''+escJs(f.slug)+'\')" style="margin-left:auto;background:none;border:1px solid var(--border-subtle);color:var(--primary);cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1;display:flex;align-items:center;transition:var(--transition);" title="Full screen" onmouseover="this.style.borderColor=\'var(--primary)\';this.style.background=\'rgba(200,154,60,0.06)\'" onmouseout="this.style.borderColor=\'\';this.style.background=\'none\'"><span class="material-symbols-outlined" style="font-size:14px;">open_in_full</span></button></h2>' + perfHtml + bmPerfHtml + '<div style="margin-top:10px;"><div id="nav-period-toggle-' + escJs(f.slug) + '" style="display:flex;gap:2px;margin-bottom:4px;flex-wrap:wrap;">' +
      ['1M','3M','6M','1Y','2Y','3Y','5Y','10Y','ALL'].map(function(p){return '<button class="nav-period-btn" data-period="'+p+'" style="background:var(--bg-elevated);border:1px solid var(--border-subtle);color:var(--text-muted);padding:1px 7px;border-radius:3px;font-size:9px;cursor:pointer;">'+p+'</button>';}).join('') +
    '</div><div style="position:relative;"><canvas id="nav-chart-' + escJs(f.slug) + '" style="max-height:180px;"></canvas></div><div id="nav-navigator-wrapper-' + escJs(f.slug) + '" class="nav-navigator-wrap"><canvas id="nav-navigator-' + escJs(f.slug) + '"></canvas><div id="nav-navigator-overlay-' + escJs(f.slug) + '" class="nav-navigator-overlay"></div></div></div></div>' : '') +
    (rollHtml ? '<div class="card"><h2>Rolling Returns</h2>' + rollHtml + '</div>' : '') +
    '<div class="card"><h2 style="cursor:pointer;display:flex;align-items:center;gap:4px;" onclick="var n=this.parentNode.querySelector(\'.holdings-body\');var a=this.querySelector(\'.h-toggle-icon\');n.style.display=n.style.display==\'none\'?\'block\':\'none\';a.textContent=a.textContent==\'expand_more\'?\'expand_less\':\'expand_more\'">Holdings (' + f.holdings.length + ') <span class="material-symbols-outlined h-toggle-icon" style="font-size:14px;color:var(--primary-dim);margin-left:auto;">expand_more</span></h2><div class="holdings-body" style="display:none;">' + hHtml + '</div></div>' +
