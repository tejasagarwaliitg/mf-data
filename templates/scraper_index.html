}

// ── Compare view ──
function _renderMatrixTable(mtx, mSlugs, fD, cellClsFn) {
  if (!mtx || mSlugs.length<2) return '<p class="na">Not enough funds</p>';
  var h = '<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th class="corner"></th>';
  mSlugs.forEach(function(s){h+='<th>'+escHtml((fD[s].name||s).slice(0,10))+'</th>';});
  h += '</tr></thead><tbody>';
  mSlugs.forEach(function(s1) {
    h += '<tr><th>'+escHtml((fD[s1].name||s1).slice(0,10))+'</th>';
    mSlugs.forEach(function(s2) {
      var v = mtx[s1]&&mtx[s1][s2]!==undefined ? mtx[s1][s2] : 0;
      var cls = cellClsFn ? cellClsFn(s1,s2,v) : 'cell on';
      h += '<td class="cell '+cls+'">'+(v%1===0?v.toFixed(0):v.toFixed(1))+'%</td>';
    });
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  return h;
}

function _jaccardCls(s1,s2,v) {
  if (s1===s2) return 'os';
  if (v>=50) return 'oh';
  if (v>=25) return 'om';
  if (v>0) return 'ol';
  return 'on';
}

function _corrCls(s1,s2,v) {
  if (s1===s2) return 'os';
  if (v>=70) return 'oh';
  if (v>=40) return 'om';
  if (v>=-40) return 'ol';
  return 'on';
}

function renderCompareView(selected, fundsData, overlap, jaccard, correlation) {
  var bmSlug = fundsData['__benchmark__'] ? '__benchmark__' : null;
  var slugs = Object.keys(fundsData).filter(function(s){return s!==bmSlug;});
  if (bmSlug) slugs.push(bmSlug);
  if (!slugs.length) return '<div class="card"><p class="na">Could not fetch data for selected funds</p></div>';

  var bmColors = ['#E69F00','#56B4E9','#009E73','#F0E442','#0072B2','#D55E00','#CC79A7','#FF6B6B','#845EC2','#FF9671'];
  window._cfc = window._cfc || {};
  var headHtml = '';
  selected.forEach(function(t, idx) {
    var d = fundsData[t.slug]; if (!d) return;
    var c = window._cfc[t.slug] || bmColors[idx % bmColors.length];
    headHtml += '<div class="ch-item" data-slug="' + escJs(t.slug) + '" style="display:flex;align-items:center;gap:4px;">' +
      '<span class="ch-dot" style="background:' + c + ';cursor:pointer;"></span>' +
      '<input type="color" value="' + c + '" style="width:0;height:0;padding:0;border:none;opacity:0;position:absolute;pointer-events:none;">' +
      '<span class="ch-name">' + escHtml(d.name.slice(0, 18)) + '</span></div>';
  });
  if (bmSlug) {
    var bd = fundsData[bmSlug];
    headHtml += '<div class="ch-item" style="border-left:2px solid #5499ff;padding-left:8px;margin-left:4px;background:rgba(84,153,255,0.06);border-radius:6px;padding:0 8px;display:flex;align-items:center;gap:4px;"><span class="ch-dot" style="background:#5499ff;"></span><span class="ch-name" style="color:#5499ff;">' + escHtml(bd.name) + '</span></div>';
  }

  function bmColStyle() {
    return 'position:sticky;right:0;background:rgba(12,19,36,0.9);backdrop-filter:blur(12px);border-left:2px solid rgba(200,154,60,0.2);z-index:1;';
  }

  function thCells() {
    return slugs.map(function(s) {
      var d = fundsData[s];
      var isBm = s === bmSlug;
      return '<th style="text-align:center;min-width:72px;' + (isBm?bmColStyle():'') + '"><div style="font-weight:600;font-size:11px;color:' + (isBm?'var(--primary)':'var(--primary-light)') + ';">' + escHtml((d?d.name:s).slice(0,16)) + '</div></th>';
    }).join('');
  }

  function renderTd(v, s, extraCls) {
    var isBm = s === bmSlug;
    var style = 'text-align:center;' + (isBm?bmColStyle():'');
    return '<td class="' + (extraCls||'') + '" style="' + style + '">' + v + '</td>';
  }

  var overviewRows = [
    ['Category', slugs.map(function(s){return fundsData[s].category||'-';})],
    ['NAV', slugs.map(function(s){return fundsData[s].nav!==null?'₹'+fundsData[s].nav:'-';})],
    ['AUM (Cr)', slugs.map(function(s){return fundsData[s].aum!==null?'₹'+_n(fundsData[s].aum, 0):'-';})],
    ['Expense', slugs.map(function(s){return _n(fundsData[s].expense_ratio, 2)+'%';})],
    ['P/E', slugs.map(function(s){return _n(fundsData[s].pe_ratio, 2);})],
    ['P/B', slugs.map(function(s){return _n(fundsData[s].pb_ratio, 2);})],
    ['Cat P/E', slugs.map(function(s){var cp=fundsData[s].category_pe;return cp?_n(cp.pe, 2)+' ('+cp.count+')':'-';})],
    ['Launch', slugs.map(function(s){return fundsData[s].launch_date||'-';})],
    ['Info Ratio', slugs.map(function(s){return _n(fundsData[s].information_ratio, 2);})],
    ['Tenure', slugs.map(function(s){var v=fundsData[s].manager_avg_tenure_days;if(!v)return'-';var y=Math.floor(v/365);return y+'y '+Math.round((v%365)/30)+'m';})],
    ['Holdings', slugs.map(function(s){return (fundsData[s].holdings||[]).length;})],
  ];
  var ovHtml = '<div style="overflow-x:auto;"><table><thead><tr><th style="min-width:90px;font-size:9px;">Metric</th>' + thCells() + '</tr></thead><tbody>';
  overviewRows.forEach(function(row) {
    ovHtml += '<tr><td style="font-weight:500;color:var(--primary-dim);font-size:11px;">' + row[0] + '</td>';
    row[1].forEach(function(v, i) { ovHtml += renderTd(v, slugs[i]); });
    ovHtml += '</tr>';
  });
  ovHtml += '</tbody></table></div>';

  var perfDefs = [['returns_6m','6M',true,'%'],['returns_1y','1Y',true,'%'],['returns_3y','3Y',true,'%'],['returns_5y','5Y',true,'%'],['std_dev','StdDev',false,'%'],['sharpe','Sharpe',true,''],['max_drawdown','Max DD',false,'%'],['downside_capture','Downside',false,'%']];
  var perfHtml = '<div style="overflow-x:auto;"><table><thead><tr><th style="font-size:9px;">Metric</th>' + thCells() + '</tr></thead><tbody>';
  perfDefs.forEach(function(pd) {
    var vals = slugs.map(function(s){return fundsData[s][pd[0]];});
    perfHtml += '<tr><td style="font-weight:500;color:var(--primary-dim);font-size:11px;">' + pd[1] + '</td>';
    vals.forEach(function(v, i) {
      if (v===null||v===undefined) { perfHtml += renderTd('N/A', slugs[i], 'na'); return; }
      var filtered = vals.filter(function(x){return x!==null&&x!==undefined;});
      var best = pd[2] ? Math.max.apply(null, filtered) : Math.min.apply(null, filtered);
      var cls = v>=0?'positive':'negative';
      if (v===best) cls+=' best';
      perfHtml += renderTd(_n(v,2)+pd[3], slugs[i], cls);
    });
    perfHtml += '</tr>';
  });
  ['rolling_1y','rolling_3y'].forEach(function(rrKey) {
    var label = rrKey==='rolling_1y'?'1Y':'3Y';
    var hasAny = slugs.some(function(s){return fundsData[s][rrKey];});
    if (!hasAny) return;
    perfHtml += '<tr><td style="padding-top:12px;border-top:2px solid var(--border-subtle);font-weight:600;color:var(--primary-light);font-size:11px;">Roll '+label+'</td><td colspan="'+slugs.length+'" style="padding-top:12px;border-top:2px solid var(--border-subtle);"></td></tr>';
    [['average','Avg',true],['min','Min',false],['max','Max',true],['std','Std',false]].forEach(function(rk) {
      var rvals = slugs.map(function(s){var rd=fundsData[s][rrKey];return rd?rd[rk[0]]:null;});
      perfHtml += '<tr><td style="padding-left:16px;color:var(--primary-dim);font-size:11px;">'+rk[1]+'</td>';
      rvals.forEach(function(v, i) {
        if (v===null||v===undefined) { perfHtml += renderTd('N/A', slugs[i], 'na'); return; }
        var filtered = rvals.filter(function(x){return x!==null&&x!==undefined;});
        var best = rk[2] ? Math.max.apply(null, filtered) : Math.min.apply(null, filtered);
        var cls = v>=0?'positive':'negative';
        if (v===best) cls+=' best';
        perfHtml += renderTd(_n(v,2)+'%', slugs[i], cls);
      });
      perfHtml += '</tr>';
    });
  });
  perfHtml += '</tbody></table></div>';

  var matrixSlugs = slugs.filter(function(s){return s!==bmSlug;});
  var matrixHtml = '';
  if (overlap && matrixSlugs.length>1) {
    matrixHtml = '<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th class="corner"></th>';
    matrixSlugs.forEach(function(s){matrixHtml+='<th>'+escHtml((fundsData[s].name||s).slice(0,10))+'</th>';});
    matrixHtml += '</tr></thead><tbody>';
    matrixSlugs.forEach(function(s1) {
      matrixHtml += '<tr><th>'+escHtml((fundsData[s1].name||s1).slice(0,10))+'</th>';
      matrixSlugs.forEach(function(s2) {
        var v = overlap[s1]&&overlap[s1][s2]!==undefined ? overlap[s1][s2] : 0;
        var cls = 'cell on';
        if (s1===s2) cls='cell os';
        else if (v>=50) cls='cell oh';
        else if (v>=25) cls='cell om';
        else if (v>0) cls='cell ol';
        matrixHtml += '<td class="'+cls+'">'+v.toFixed(0)+'%</td>';
      });
      matrixHtml += '</tr>';
    });
    matrixHtml += '</tbody></table></div>';
  }

  var jaccardHtml = overlap && matrixSlugs.length>1 ? _renderMatrixTable(jaccard, matrixSlugs, fundsData, _jaccardCls) : '';

  var corrYears = 3;
  var corrData = correlation ? correlation[corrYears] : null;
  var corrHtml = '';
  if (corrData && matrixSlugs.length>1) {
    corrHtml = '<div style="margin-bottom:6px;display:flex;gap:2px;">' +
      [1,3,5].map(function(y){return '<button class="corr-period-btn" data-years="'+y+'" style="background:var(--bg-elevated);border:1px solid var(--border-subtle);color:var(--text-muted);padding:1px 8px;border-radius:3px;font-size:9px;cursor:pointer;'+(y===corrYears?'background:var(--primary);color:#fff;border-color:var(--primary);':'')+'">'+y+'Y</button>';}).join('') +
      '</div>';
    corrHtml += _renderMatrixTable(corrData, matrixSlugs, fundsData, _corrCls);
  }

  var hgridHtml = '';
  slugs.forEach(function(s) {
    if (s===bmSlug) return;
    var d = fundsData[s]; if (!d) return;
    var rows = '';
    (d.holdings||[]).slice(0,25).forEach(function(h,i) {
      var peStr = _n(h.stock_pe, 1);
      var bar = _n(h.percent, 1) !== '-'
        ? '<span class="bar-bg"><span class="bar-fill" style="width:'+Math.min(Number(h.percent)*1.2,40)+'px"></span></span><span class="pct">'+_n(h.percent, 1)+'%</span>'
        : '-';
      rows += '<tr><td style="color:var(--text-dim);">'+(i+1)+'</td><td style="color:var(--text-primary);font-weight:600;">'+escHtml(h.company||'-')+'</td><td style="color:var(--text-muted);">'+peStr+'</td><td style="text-align:right;">'+bar+'</td></tr>';
    });
    var more = d.holdings&&d.holdings.length>25 ? '<tr><td colspan="4" style="text-align:center;color:var(--text-dim);font-size:10px;">+'+(d.holdings.length-25)+' more</td></tr>' : '';
    hgridHtml += '<div class="hcard"><h3>'+escHtml(d.name.slice(0,26))+' <span style="font-weight:400;color:var(--text-muted);">('+(d.holdings||[]).length+')</span></h3>' +
      '<table><thead><tr><th>#</th><th>Stock</th><th>P/E</th><th style="text-align:right;">%</th></tr></thead><tbody>'+rows+more+'</tbody></table></div>';
  });

  return '<div class="card"><h2><span class="material-symbols-outlined" style="font-size:16px;margin-right:6px;">compare_arrows</span>Comparing <span class="badge">'+(selected.length+(bmSlug?1:0))+' funds</span></h2><div class="comp-head">'+headHtml+'</div></div>' +
    '<div class="card"><h2>Overview</h2>'+ovHtml+'</div>' +
    '<div class="card"><h2>Performance</h2>'+perfHtml+'</div>' +
    '<div class="card"><h2 style="display:flex;align-items:center;gap:8px;">NAV Comparison <span style="font-size:9px;color:var(--text-dim);">% change from start</span><button onclick="_toggleNavFS(null)" style="margin-left:auto;background:none;border:1px solid var(--border-subtle);color:var(--primary);cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1;display:flex;align-items:center;transition:var(--transition);" title="Full screen" onmouseover="this.style.borderColor=\'var(--primary)\';this.style.background=\'rgba(200,154,60,0.06)\'" onmouseout="this.style.borderColor=\'\';this.style.background=\'none\'"><span class="material-symbols-outlined" style="font-size:14px;">open_in_full</span></button></h2><div id="compare-period-toggle" style="display:flex;gap:2px;margin-bottom:4px;flex-wrap:wrap;">' +
      ['1M','3M','6M','1Y','2Y','3Y','5Y','10Y','ALL'].map(function(p){return '<button class="nav-period-btn-cmp" data-period="'+p+'" style="background:var(--bg-elevated);border:1px solid var(--border-subtle);color:var(--text-muted);padding:1px 7px;border-radius:3px;font-size:9px;cursor:pointer;">'+p+'</button>';}).join('') +
    '</div><div style="position:relative;"><canvas id="compare-nav-chart" style="max-height:200px;"></canvas></div><div id="nav-navigator-wrapper-compare" class="nav-navigator-wrap"><canvas id="nav-navigator-compare"></canvas><div id="nav-navigator-overlay-compare" class="nav-navigator-overlay"></div></div></div>' +
    (matrixSlugs.length>1?'<div class="card"><h2>Holdings Overlap <span class="badge">N×N</span></h2>'+matrixHtml+'<p style="font-size:10px;color:var(--text-dim);margin-top:10px;text-align:center;">Overlap = sum of min(w<sub>A</sub>, w<sub>B</sub>) for common stocks</p></div>':'') +
    (matrixSlugs.length>1?'<div class="card"><h2>Holdings Overlap — Jaccard <span class="badge">N×N</span></h2>'+jaccardHtml+'<p style="font-size:10px;color:var(--text-dim);margin-top:10px;text-align:center;">Jaccard = (common stocks) / (total unique stocks)</p></div>':'') +
    (matrixSlugs.length>1?'<div class="card" id="corr-card"><h2 style="display:flex;align-items:center;gap:8px;">Return Correlation <span class="badge">N×N</span></h2>'+corrHtml+'<p style="font-size:10px;color:var(--text-dim);margin-top:10px;text-align:center;">Pearson correlation of daily returns</p></div>':'') +
    '<div class="card"><h2>Holdings Breakdown</h2><div class="holdings-grid">'+hgridHtml+'</div></div>';
}

// ── Utils ──
function escHtml(s) { if (!s) return ''; var d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }
function escJs(s) { if (!s) return ''; return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function _toggleNavFS(slug) {
  var overlay = document.getElementById('nav-fs-overlay');
  var fsCanvas = document.getElementById('nav-fs-canvas');
  if (overlay.classList.contains('active')) { _exitNavFS(); return; }

  var _PERIODS = {'1M':30,'3M':90,'6M':180,'1Y':365,'2Y':730,'3Y':1095,'5Y':1825,'10Y':3650};
  var datasets, labels, title;

  if (slug === null) {
    var cmp = _fundNavCache && _fundNavCache.__compare__;
    if (!cmp) return;
    var toggleEl = document.getElementById('compare-period-toggle');
    var period = '3Y';
    if (toggleEl) {
      var activeBtn = toggleEl.querySelector('.nav-period-btn-cmp.active');
      if (activeBtn) period = activeBtn.getAttribute('data-period');
    }
    var days = _PERIODS[period];
    if (period === 'ALL') days = null;
    var colors = ['#E69F00','#56B4E9','#009E73','#F0E442','#0072B2','#D55E00','#CC79A7','#000000'];
    datasets = [];
    var firstLabels = null;
    var ci = 0;
    cmp.funds.forEach(function(f) {
      if (!f || !f.nav_chart || f.nav_chart.length < 2) return;
      var rebased = _rebasedNavSlice(f.nav_chart, days);
      if (!rebased) return;
      var isBm = f.slug === '__benchmark__';
      datasets.push({
        label: (f.name || f.slug || '').slice(0,22),
        data: rebased.map(function(p){return p[1];}),
        _rawNav: rebased.map(function(p){return p[2];}),
        borderColor: isBm ? '#5499ff' : (window._cfc && window._cfc[f.slug] ? window._cfc[f.slug] : colors[ci % colors.length]),
        backgroundColor: isBm ? 'rgba(84,153,255,0.04)' : 'transparent',
        borderWidth: isBm ? 3 : 2,
        borderDash: isBm ? [6,4] : [],
        pointRadius: 0, pointHoverRadius: 6, tension: 0.1, fill: false
      });
      if (!firstLabels) firstLabels = rebased.map(function(p){return p[0];});
      if (!isBm) ci++;
    });
    labels = firstLabels || [];
    title = 'Compare — % Change from Period Start';
  } else {
    var data = _fundNavCache && _fundNavCache[slug];
    if (!data || !data.navData || data.navData.length < 2) return;
    var toggleEl = document.getElementById('nav-period-toggle-' + slug);
    var period = '3Y';
    if (toggleEl) {
      var activeBtn = toggleEl.querySelector('.nav-period-btn.active');
      if (activeBtn) period = activeBtn.getAttribute('data-period');
    }
    var days = _PERIODS[period];
    if (period === 'ALL') days = null;
    var rebased = _rebasedNavSlice(data.navData, days);
    if (!rebased) return;
    labels = rebased.map(function(p){return p[0];});
    datasets = [{
      label: data.name ? data.name.slice(0,40) : 'Fund',
      data: rebased.map(function(p){return p[1];}),
      _rawNav: rebased.map(function(p){return p[2];}),
      borderColor: '#C89A3C',
      backgroundColor: 'rgba(200,154,60,0.06)',
      borderWidth: 2, pointRadius: 0, pointHoverRadius: 6, tension: 0.1, fill: true
    }];
    if (data.bmChart && data.bmChart.length >= 2) {
      var bmRebased = _rebasedNavSlice(data.bmChart, days);
      if (bmRebased) {
        datasets.push({
          label: data.bmName || 'Benchmark',
          data: bmRebased.map(function(p){return p[1];}),
          _rawNav: bmRebased.map(function(p){return p[2];}),
          borderColor: '#f1bf5d',
          backgroundColor: 'transparent',
          borderWidth: 2.5,
          borderDash: [5,3],
          pointRadius: 0, pointHoverRadius: 6, tension: 0.1, fill: false
        });
      }
    }
    title = data.name + ' — % Change from Period Start';
  }

  if (fsCanvas._navChart) fsCanvas._navChart.destroy();
  _buildNavChart(fsCanvas, datasets, labels);
  var labelEl = document.getElementById('nav-fs-label');
  if (labelEl) labelEl.textContent = title || '';
  overlay.classList.add('active');
  _navFS = { slug: slug, period: period };
  requestAnimationFrame(function(){if(fsCanvas._navChart)fsCanvas._navChart.resize();});
}
function _exitNavFS() {
  var overlay = document.getElementById('nav-fs-overlay');
  var fsCanvas = document.getElementById('nav-fs-canvas');
  if (fsCanvas._navChart) fsCanvas._navChart.destroy();
  overlay.classList.remove('active');
  if (_navFS && _navFS.slug !== undefined && _navFS.slug !== null) {
    var toggleEl = document.getElementById('nav-period-toggle-' + _navFS.slug);
    if (toggleEl) {
      var activeBtn = toggleEl.querySelector('.nav-period-btn.active');
      if (activeBtn) activeBtn.click();
    }
  } else if (_navFS && _navFS.slug === null) {
    var toggleEl = document.getElementById('compare-period-toggle');
    if (toggleEl) {
      var activeBtn = toggleEl.querySelector('.nav-period-btn-cmp.active');
      if (activeBtn) activeBtn.click();
    }
  }
  _navFS = null;
}
var _navFS = null;
var _fundNavCache = {};

init();
</script>
<div id="nav-fs-overlay" class="nav-fs-overlay">
  <button class="nav-fs-close" onclick="_exitNavFS()">&times;</button>
  <div id="nav-fs-label" class="nav-fs-label"></div>
  <canvas id="nav-fs-canvas" style="max-width:90vw;"></canvas>
</div>
</body>
</html>
